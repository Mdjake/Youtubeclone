<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <i class="fas fa-bars menu-icon" onclick="toggleSidebar()"></i>
            <a href="index.html" class="logo">
                <i class="fab fa-youtube" style="color: #ff0000;"></i>
                <span>YouTube</span>
            </a>
        </div>
        
        <div class="header-center">
            <form class="search-form" onsubmit="searchVideos(event)">
                <input type="text" id="searchInput" placeholder="Search" required>
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>
        
        <div class="header-right">
            <i class="fas fa-video"></i>
            <i class="fas fa-th"></i>
            <i class="fas fa-bell"></i>
            <div class="avatar">U</div>
        </div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-item active" onclick="loadTrending()">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </div>
        <div class="sidebar-item" onclick="loadTrending()">
            <i class="fas fa-fire"></i>
            <span>Trending</span>
        </div>
        <div class="sidebar-item">
            <i class="fas fa-clock"></i>
            <span>History</span>
        </div>
        <div class="sidebar-item">
            <i class="fas fa-thumbs-up"></i>
            <span>Liked videos</span>
        </div>
        <hr>
        <div class="sidebar-item">
            <i class="fas fa-folder"></i>
            <span>Playlists</span>
        </div>
        <div class="sidebar-item">
            <i class="fas fa-clock"></i>
            <span>Watch later</span>
        </div>
        <div class="sidebar-item">
            <i class="fas fa-heart"></i>
            <span>Favorites</span>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="home-container">
            <div class="filter-bar">
                <div class="filter-tabs" id="filterTabs">
                    <button class="filter-tab active" onclick="filterVideos('all')">All</button>
                    <button class="filter-tab" onclick="filterVideos('music')">Music</button>
                    <button class="filter-tab" onclick="filterVideos('gaming')">Gaming</button>
                    <button class="filter-tab" onclick="filterVideos('news')">News</button>
                    <button class="filter-tab" onclick="filterVideos('sports')">Sports</button>
                    <button class="filter-tab" onclick="filterVideos('movies')">Movies</button>
                    <button class="filter-tab" onclick="filterVideos('live')">Live</button>
                </div>
            </div>
            
            <div class="video-grid" id="videoGrid">
                <!-- Videos loaded dynamically -->
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading videos...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Load trending videos on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadTrending();
        });
    </script>
</body>
</html>
